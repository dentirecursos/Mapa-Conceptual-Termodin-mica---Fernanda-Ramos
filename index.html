<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script><script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script><script src="https://cdn.jsdelivr.net/npm/markmap-toolbar@0.18.12/dist/index.js"></script><script>(()=>{setTimeout(()=>{const{markmap:S,mm:Q}=window,$=new S.Toolbar;$.attach(Q);const I=$.render();I.setAttribute("style","position:absolute;bottom:20px;right:20px"),document.body.append(I)})})()</script><script>((l,U,M,R)=>{const N=l();window.mm=N.Markmap.create("svg#mindmap",(U||N.deriveOptions)(R),M),window.matchMedia("(prefers-color-scheme: dark)").matches&&document.documentElement.classList.add("markmap-dark")})(()=>window.markmap,null,{"content":"","children":[{"content":"<strong>TERMODIN&#xc1;MICA</strong> <br> Rama de la f&#xed;sica encargada de estudiar <br> las interacciones entre el Calor, el Trabajo y la Energ&#xed;a, <br> y c&#xf3;mo estas interacciones alteran los Sistemas.","children":[{"content":"<strong>1. Conceptos de Energ&#xed;a y Transferencia</strong>","children":[{"content":"<strong>Energ&#xed;a:</strong> Capacidad de un sistema de interactuar y transformarse. <br> No se crea ni se destruye, solo se transforma entre el sistema y su entorno.","children":[],"payload":{"tag":"li","lines":"3,4"}},{"content":"<strong>Energ&#xed;a Interna (Eint ):</strong> Toda la energ&#xed;a asociada con los componentes <br> microsc&#xf3;picos de un sistema, abarcando la energ&#xed;a cin&#xe9;tica <br> y potencial intermolecular. Es una variable de estado.","children":[],"payload":{"tag":"li","lines":"4,5"}},{"content":"<strong>Trabajo (W):</strong> Transferencia de energ&#xed;a lograda <br> a trav&#xe9;s de mecanismos mec&#xe1;nicos macrosc&#xf3;picos.","children":[],"payload":{"tag":"li","lines":"5,6"}},{"content":"<strong>Calor (Q):</strong> Transferencia de energ&#xed;a a trav&#xe9;s de la frontera <br> de un sistema, provocada exclusivamente por una diferencia de Temperatura.","children":[{"content":"<strong>Mecanismos de Transferencia de calor:</strong>","children":[{"content":"<strong>Conducci&#xf3;n:</strong> Intercambio de energ&#xed;a cin&#xe9;tica entre part&#xed;culas microsc&#xf3;picas en contacto.","children":[],"payload":{"tag":"li","lines":"8,9"}},{"content":"<strong>Convecci&#xf3;n:</strong> Transferencia originada por el movimiento de una sustancia caliente (fluido).","children":[],"payload":{"tag":"li","lines":"9,10"}},{"content":"<strong>Radiaci&#xf3;n:</strong> Transferencia mediante ondas electromagn&#xe9;ticas emitidas por un cuerpo.","children":[],"payload":{"tag":"li","lines":"10,12"}}],"payload":{"tag":"li","lines":"7,12"}}],"payload":{"tag":"li","lines":"6,12"}}],"payload":{"tag":"h3","lines":"2,3"}},{"content":"<strong>2. Propiedades T&#xe9;rmicas y Medici&#xf3;n</strong>","children":[{"content":"<strong>Temperatura:</strong> Propiedad fundamental que determina <br> si un sistema se encuentra en equilibrio t&#xe9;rmico con otro. <br> Su cambio provoca variaciones en las dimensiones de los cuerpos.","children":[{"content":"<strong>Escalas de Temperatura:</strong>","children":[{"content":"<strong>Celsius (&#xb0;C):</strong> Se basa en los puntos de congelaci&#xf3;n (0&#xb0;C) y ebullici&#xf3;n (100&#xb0;C) del agua.","children":[],"payload":{"tag":"li","lines":"15,16"}},{"content":"<strong>Kelvin (K):</strong> Escala cient&#xed;fica absoluta basada en el punto triple del agua y el cero absoluto (-273.15 &#xb0;C).","children":[],"payload":{"tag":"li","lines":"16,17"}},{"content":"<strong>Fahrenheit (&#xb0;F):</strong> Escala donde el agua se congela a 32&#xb0;F y ebulle a 212&#xb0;F.","children":[],"payload":{"tag":"li","lines":"17,18"}}],"payload":{"tag":"li","lines":"14,18"}},{"content":"<strong>Dilataci&#xf3;n T&#xe9;rmica:</strong> Cambio en las dimensiones geom&#xe9;tricas <br> de una sustancia al modificarse la Temperatura debido <br> al cambio en la separaci&#xf3;n de sus &#xe1;tomos.","children":[{"content":"<strong>Lineal:</strong> Alteraci&#xf3;n predominante en una sola dimensi&#xf3;n (largo).","children":[],"payload":{"tag":"li","lines":"19,20"}},{"content":"<strong>Superficial:</strong> Afectaci&#xf3;n significativa en dos dimensiones (&#xe1;rea).","children":[],"payload":{"tag":"li","lines":"20,21"}},{"content":"<strong>Volum&#xe9;trica:</strong> Expansi&#xf3;n o contracci&#xf3;n en las tres dimensiones del espacio.","children":[],"payload":{"tag":"li","lines":"21,23"}}],"payload":{"tag":"li","lines":"18,23"}}],"payload":{"tag":"li","lines":"13,23"}}],"payload":{"tag":"h3","lines":"12,13"}},{"content":"<strong>3. Sistemas Termodin&#xe1;micos y la Materia</strong>","children":[{"content":"<strong>Sistemas:</strong> Porci&#xf3;n del universo que se a&#xed;sla, <br> mediante fronteras reales o imaginarias, para su estudio.","children":[{"content":"<strong>Abierto:</strong> Intercambia libremente Materia y Energ&#xed;a con su entorno.","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"<strong>Cerrado:</strong> Intercambia Energ&#xed;a (calor o trabajo), pero NO materia.","children":[],"payload":{"tag":"li","lines":"26,27"}},{"content":"<strong>Aislado:</strong> NO intercambia ni materia ni energ&#xed;a. Su energ&#xed;a interna permanece siempre constante.","children":[],"payload":{"tag":"li","lines":"27,29"}}],"payload":{"tag":"li","lines":"24,29"}}],"payload":{"tag":"h3","lines":"23,24"}},{"content":"<strong>4. Materia y sus Propiedades F&#xed;sicas</strong>","children":[{"content":"<strong>Estado:</strong> Condici&#xf3;n espec&#xed;fica de un sistema <br> cuando est&#xe1; en equilibrio interno, la cual se <br> describe mediante variables macrosc&#xf3;picas <br> exactas como presi&#xf3;n, volumen, Temperatura y Energ&#xed;a interna.","children":[],"payload":{"tag":"li","lines":"30,31"}},{"content":"<strong>Fase:</strong> Presentaci&#xf3;n homog&#xe9;nea de la materia (s&#xf3;lido, liquido, gas)<br> El paso de una fase a otra ocurre a temperatura constante <br> a trav&#xe9;s del suministro o liberaci&#xf3;n de calor latente.","children":[],"payload":{"tag":"li","lines":"31,32"}},{"content":"<strong>Dilataci&#xf3;n:</strong> Fen&#xf3;meno de expansi&#xf3;n t&#xe9;rmica.<br> Es el aumento en volumen o longitud que sufre <br> una sustancia al incrementarse la temperatura, <br> causado por el aumento en la separaci&#xf3;n y <br> oscilaci&#xf3;n promedio entre sus &#xe1;tomos","children":[],"payload":{"tag":"li","lines":"32,34"}}],"payload":{"tag":"h3","lines":"29,30"}},{"content":"<strong>5. Leyes de la Termodin&#xe1;mica.</strong> <br> Son los principios que dictan <br> las reglas universales <br> para los procesos t&#xe9;rmicos:","children":[{"content":"<strong>Ley Cero (Equilibrio T&#xe9;rmico):</strong> Establece que si dos objetos (A y B) est&#xe1;n <br> en equilibrio t&#xe9;rmico con un tercer objeto (C), entonces A y B tambi&#xe9;n <br> est&#xe1;n en equilibrio t&#xe9;rmico entre s&#xed;. Es la base que permite definir la Temperatura.","children":[],"payload":{"tag":"li","lines":"35,36"}},{"content":"<strong>Primera Ley:</strong> Es la ley de conservaci&#xf3;n de la Energ&#xed;a. Estipula que el cambio en la <br> Energ&#xed;a interna de un sistema es estrictamente igual al Calor neto transferido <br> al sistema m&#xe1;s el Trabajo realizado sobre &#xe9;l (&#x394;Eint =Q+W).","children":[],"payload":{"tag":"li","lines":"36,37"}},{"content":"<strong>Segunda Ley:</strong> Impone un l&#xed;mite a la transformaci&#xf3;n de la energ&#xed;a y determina <br> la direcci&#xf3;n irreversible de los procesos naturales.","children":[{"content":"<strong>Enunciado de Kelvin-Planck:</strong> Es imposible tener una m&#xe1;quina t&#xe9;rmica <br> que convierta el 100% de la entrada de calor en trabajo.","children":[],"payload":{"tag":"li","lines":"38,39"}},{"content":"<strong>Enunciado de Clausius:</strong> Es imposible transferir energ&#xed;a t&#xe9;rmica <br> espont&#xe1;neamente de un objeto fr&#xed;o a uno m&#xe1;s caliente sin una entrada de trabajo","children":[],"payload":{"tag":"li","lines":"39,40"}}],"payload":{"tag":"li","lines":"37,40"}}],"payload":{"tag":"h3","lines":"34,35"}}],"payload":{"tag":"h1","lines":"0,1"}},{"content":"<strong>AUTORA: FERNANDA RAMOS</strong>","children":[],"payload":{"tag":"h1","lines":"40,41"}}]},null)</script>
